[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"

# Otimizador ligado (Ajuda a gastar menos Gas no Deploy)
optimizer = true
optimizer_runs = 200

# Mapeamento para o Foundry achar o OpenZeppelin e o Chainlink
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "chainlink-brownie-contracts/=lib/chainlink-brownie-contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Configurações de Fuzzing (Lembra da nossa "metralhadora de testes"?)
[profile.default.fuzz]
runs = 256